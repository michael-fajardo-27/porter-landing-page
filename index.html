<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porter - AI-Native Accounting Software</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #1a1a3e 0%, transparent 70%);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #1e2a4a 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
      animation-delay: -7s;
    }
    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #2a1a3e 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }

    /* Grid background */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
    }

    /* Subtle scan line */
    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
      animation: scan 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%, 100% { top: -200px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 40px;
    }

    /* Logo container with glow effect */
    .logo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
      animation: logoReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo {
      height: clamp(120px, 24vw, 200px);
      width: auto;
      position: relative;
      z-index: 2;
    }

    /* Logo glow pulse effect */
    .logo-glow {
      position: absolute;
      top: 50%;
      left: 30%;
      transform: translate(-50%, -50%);
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: logoPulse 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes logoReveal {
      0% {
        opacity: 0;
        transform: translateY(60px) scale(0.9);
        filter: blur(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes logoPulse {
      0%, 100% {
        opacity: 0.4;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    .tagline {
      font-size: clamp(18px, 2.5vw, 26px);
      color: #888;
      max-width: 600px;
      margin: 0 auto;
      font-weight: 400;
      position: relative;
    }

    /* Animated words */
    .tagline span {
      display: inline-block;
      animation: wordFade 1s ease both;
    }
    .tagline span:nth-child(1) { animation-delay: 0.6s; }
    .tagline span:nth-child(2) { animation-delay: 0.7s; }
    .tagline span:nth-child(3) { animation-delay: 0.8s; }
    .tagline span:nth-child(4) { animation-delay: 0.9s; }
    .tagline span:nth-child(5) { animation-delay: 1.0s; }
    .tagline span:nth-child(6) { animation-delay: 1.1s; }
    .tagline span:nth-child(7) { animation-delay: 1.2s; }
    .tagline span:nth-child(8) { animation-delay: 1.3s; }
    .tagline span:nth-child(9) { animation-delay: 1.4s; }

    @keyframes wordFade {
      0% { opacity: 0; transform: translateY(20px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: rise 15s linear infinite;
    }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-delay: -2s; }
    .particle:nth-child(3) { left: 30%; animation-delay: -4s; }
    .particle:nth-child(4) { left: 40%; animation-delay: -6s; }
    .particle:nth-child(5) { left: 50%; animation-delay: -8s; }
    .particle:nth-child(6) { left: 60%; animation-delay: -10s; }
    .particle:nth-child(7) { left: 70%; animation-delay: -12s; }
    .particle:nth-child(8) { left: 80%; animation-delay: -14s; }
    .particle:nth-child(9) { left: 90%; animation-delay: -3s; }
    .particle:nth-child(10) { left: 95%; animation-delay: -7s; }
    .particle:nth-child(11) { left: 15%; animation-delay: -5s; }
    .particle:nth-child(12) { left: 85%; animation-delay: -9s; }

    @keyframes rise {
      0% { bottom: -10px; opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { bottom: 100vh; opacity: 0; }
    }

    /* Neural network connection lines */
    .neural-lines {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .neural-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
      animation: neuralPulse 4s ease-in-out infinite;
      transform-origin: left center;
    }

    .neural-line:nth-child(1) {
      width: 200px;
      top: 25%;
      left: 5%;
      transform: rotate(25deg);
      animation-delay: 0s;
    }
    .neural-line:nth-child(2) {
      width: 150px;
      top: 35%;
      right: 10%;
      transform: rotate(-15deg);
      animation-delay: -1s;
    }
    .neural-line:nth-child(3) {
      width: 180px;
      bottom: 30%;
      left: 15%;
      transform: rotate(-20deg);
      animation-delay: -2s;
    }
    .neural-line:nth-child(4) {
      width: 120px;
      bottom: 25%;
      right: 20%;
      transform: rotate(30deg);
      animation-delay: -1.5s;
    }
    .neural-line:nth-child(5) {
      width: 160px;
      top: 60%;
      left: 8%;
      transform: rotate(10deg);
      animation-delay: -0.5s;
    }
    .neural-line:nth-child(6) {
      width: 140px;
      top: 45%;
      right: 5%;
      transform: rotate(-35deg);
      animation-delay: -2.5s;
    }

    @keyframes neuralPulse {
      0%, 100% {
        opacity: 0;
        transform: scaleX(0.3) rotate(var(--rotation, 0deg));
      }
      50% {
        opacity: 1;
        transform: scaleX(1) rotate(var(--rotation, 0deg));
      }
    }

    /* Data stream effect */
    .data-streams {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .data-stream {
      position: absolute;
      width: 1px;
      height: 60px;
      background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      animation: dataFlow 3s linear infinite;
    }

    .data-stream:nth-child(1) { left: 12%; animation-delay: 0s; }
    .data-stream:nth-child(2) { left: 28%; animation-delay: -0.8s; }
    .data-stream:nth-child(3) { left: 45%; animation-delay: -1.6s; }
    .data-stream:nth-child(4) { left: 62%; animation-delay: -2.4s; }
    .data-stream:nth-child(5) { left: 78%; animation-delay: -0.4s; }
    .data-stream:nth-child(6) { left: 88%; animation-delay: -1.2s; }
    .data-stream:nth-child(7) { left: 35%; animation-delay: -2s; }
    .data-stream:nth-child(8) { left: 55%; animation-delay: -2.8s; }

    @keyframes dataFlow {
      0% {
        top: -60px;
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        top: 100vh;
        opacity: 0;
      }
    }

    /* Corner accents */
    .corner {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }
    .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
    .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      text-align: center;
      font-size: 13px;
      color: #666;
      z-index: 10;
    }
    .footer a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer a:hover {
      color: #fff;
    }
    .footer .separator {
      margin: 0 8px;
    }

  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid"></div>
  <div class="scanline"></div>

  <!-- Neural network connection lines -->
  <div class="neural-lines">
    <div class="neural-line"></div>
    <div class="neural-line"></div>
    <div class="neural-line"></div>
    <div class="neural-line"></div>
    <div class="neural-line"></div>
    <div class="neural-line"></div>
  </div>

  <!-- Data streams -->
  <div class="data-streams">
    <div class="data-stream"></div>
    <div class="data-stream"></div>
    <div class="data-stream"></div>
    <div class="data-stream"></div>
    <div class="data-stream"></div>
    <div class="data-stream"></div>
    <div class="data-stream"></div>
    <div class="data-stream"></div>
  </div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="porter-logo-dark-transparent.svg" alt="Porter" class="logo">
    </div>
    <p class="tagline">
      <span>The</span>
      <span>AI-native</span>
      <span>financial</span>
      <span>management</span>
      <span>software</span>
      <span>for</span>
      <span>startups</span>
      <span>and</span>
      <span>SMBs</span>
    </p>
  </div>

  <footer class="footer">
    <span>&copy; 2026 Porter Operations LLC</span>
    <span class="separator">&middot;</span>
    <a href="terms-of-service.html">Terms of Service</a>
    <span class="separator">&middot;</span>
    <a href="privacy-policy.html">Privacy Policy</a>
  </footer>
</body>
</html>
