<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porter - AI-Native Accounting Software</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #1a1a3e 0%, transparent 70%);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #1e2a4a 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
      animation-delay: -7s;
    }
    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #2a1a3e 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }

    /* Grid background */
    .grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
    }

    /* Subtle scan line */
    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
      animation: scan 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%, 100% { top: -200px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 40px;
    }

    h1 {
      font-size: clamp(80px, 16vw, 180px);
      font-weight: 700;
      letter-spacing: -8px;
      margin-bottom: 28px;
      background: linear-gradient(180deg, #ffffff 0%, #666666 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      position: relative;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: lineExpand 1.5s ease 0.8s both;
    }

    @keyframes titleReveal {
      0% { 
        opacity: 0; 
        transform: translateY(60px) scale(0.9);
        filter: blur(10px);
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes lineExpand {
      0% { width: 0; opacity: 0; }
      100% { width: 120px; opacity: 1; }
    }

    .tagline {
      font-size: clamp(18px, 2.5vw, 26px);
      color: #888;
      max-width: 600px;
      margin: 0 auto;
      font-weight: 400;
      animation: fadeUp 1s ease 0.5s both;
      position: relative;
    }

    /* Animated words */
    .tagline span {
      display: inline-block;
      animation: wordFade 1s ease both;
    }
    .tagline span:nth-child(1) { animation-delay: 0.6s; }
    .tagline span:nth-child(2) { animation-delay: 0.7s; }
    .tagline span:nth-child(3) { animation-delay: 0.8s; }
    .tagline span:nth-child(4) { animation-delay: 0.9s; }
    .tagline span:nth-child(5) { animation-delay: 1.0s; }
    .tagline span:nth-child(6) { animation-delay: 1.1s; }
    .tagline span:nth-child(7) { animation-delay: 1.2s; }
    .tagline span:nth-child(8) { animation-delay: 1.3s; }

    @keyframes wordFade {
      0% { opacity: 0; transform: translateY(20px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: rise 15s linear infinite;
    }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-delay: -2s; }
    .particle:nth-child(3) { left: 30%; animation-delay: -4s; }
    .particle:nth-child(4) { left: 40%; animation-delay: -6s; }
    .particle:nth-child(5) { left: 50%; animation-delay: -8s; }
    .particle:nth-child(6) { left: 60%; animation-delay: -10s; }
    .particle:nth-child(7) { left: 70%; animation-delay: -12s; }
    .particle:nth-child(8) { left: 80%; animation-delay: -14s; }
    .particle:nth-child(9) { left: 90%; animation-delay: -3s; }
    .particle:nth-child(10) { left: 95%; animation-delay: -7s; }

    @keyframes rise {
      0% { bottom: -10px; opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { bottom: 100vh; opacity: 0; }
    }

    /* Corner accents */
    .corner {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }
    .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
    .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }

  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid"></div>
  <div class="scanline"></div>
  
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <h1>Porter</h1>
    <p class="tagline">
      <span>The</span>
      <span>AI-native</span>
      <span>accounting</span>
      <span>software</span>
      <span>for</span>
      <span>startups</span>
      <span>and</span>
      <span>SMBs</span>
    </p>
  </div>
</body>
</html>
